project: codeperf-demo-multi-module

staticScan:
  enabled: true
  mode: changed
  sourceRoots:
    - codeperf-demo-admin/src/main/java
    - codeperf-demo-app/src/main/java
    - codeperf-demo-common/src/main/java
  includeTests: false
  baseRef: origin/master
  headRef: HEAD
  failOn: WARN
  callChain:
    enabled: true
    maxDepth: 2
  ioTypes:
    - mysql
    - mongodb
    - redis
    - gaussdb
    - http
    - rpc
    - sdk

modules:
  - name: codeperf-demo-admin
    sourceRoots:
      - codeperf-demo-admin/src/main/java
  - name: codeperf-demo-app
    sourceRoots:
      - codeperf-demo-app/src/main/java
  - name: codeperf-demo-common
    sourceRoots:
      - codeperf-demo-common/src/main/java

report:
  local:
    enabled: true
    path: .codeperf/report/source-report.json
  upload:
    enabled: false
    serverUrl: http://127.0.0.1:9095
