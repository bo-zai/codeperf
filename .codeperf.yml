project: codeperf-demo

staticScan:
  enabled: true
  mode: changed
  sourceRoots:
    - codeperf-demo/src/main/java
  includeTests: false
  baseRef: origin/master
  headRef: HEAD
  failOn: WARN
  callChain:
    enabled: true
    maxDepth: 2
  ioTypes:
    - mysql
    - mongodb
    - redis
    - gaussdb
    - http
    - rpc
    - sdk

report:
  local:
    enabled: true
    path: .codeperf/report/source-report.json
  upload:
    enabled: false
    serverUrl: http://codeperf.company.com
